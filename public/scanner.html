<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KFS Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js" defer></script>
<style>
  :root {
    --bg: #090909;
    --surface: #111;
    --border: #1c1c1c;
    --text: #f0f0f0;
    --muted: #555;
    --accent: #fff;
    --green: #22c55e;
    --green-dim: rgba(34,197,94,.12);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,.12);
    --amber: #f59e0b;
    --amber-dim: rgba(245,158,11,.12);
    --blue: #58a6ff;
    --blue-dim: rgba(88,166,255,.1);
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── LOGIN ── */
  #login-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    gap: 24px;
  }
  .login-logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .login-logo .kfs-mark {
    width: 56px;
    height: 56px;
    background: var(--text);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 900;
    color: var(--bg);
    letter-spacing: -.03em;
  }
  .login-logo h1 {
    font-size: 15px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: .06em;
    text-transform: uppercase;
  }
  .login-card {
    width: 100%;
    max-width: 360px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .login-card h2 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -.02em;
    margin-bottom: 2px;
  }
  .login-card p {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 13px 14px;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  .field input:focus { border-color: #333; }
  .field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; display: block; margin-bottom: 6px; }

  /* ── BUTTONS ── */
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    -webkit-font-smoothing: antialiased;
  }
  .btn:active { opacity: .75; transform: scale(.98); }
  .btn-primary { background: var(--text); color: var(--bg); }
  .btn-green  { background: var(--green); color: #fff; }
  .btn-ghost  { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid rgba(239,68,68,.2); }
  .btn-sm { padding: 10px 16px; font-size: 13px; width: auto; border-radius: 8px; }

  #login-error {
    background: var(--red-dim);
    border: 1px solid rgba(239,68,68,.2);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 13px;
    color: var(--red);
    display: none;
  }

  /* ── MAIN APP ── */
  #app { flex: 1; display: none; flex-direction: column; }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: #0a0a0a;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar .kfs-badge {
    background: var(--text);
    color: var(--bg);
    font-size: 11px;
    font-weight: 800;
    padding: 4px 8px;
    border-radius: 5px;
    letter-spacing: .03em;
  }
  .topbar .event-name {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .topbar .admin-name {
    font-size: 12px;
    color: var(--muted);
  }
  .topbar .logout-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 6px;
    display: flex;
    align-items: center;
  }
  .topbar .logout-btn:hover { color: var(--red); }

  /* ── TABS ── */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: #0a0a0a;
    position: sticky;
    top: 57px;
    z-index: 9;
  }
  .tab {
    flex: 1;
    padding: 12px 8px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    border: none;
    background: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
    letter-spacing: .03em;
    text-transform: uppercase;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }

  /* ── SCANNER TAB ── */
  #tab-scanner, #tab-data { padding: 16px; display: none; }
  #tab-scanner.visible, #tab-data.visible { display: block; }

  /* ── EVENT SELECTOR ── */
  .event-select-wrap {
    position: relative;
    margin-bottom: 16px;
  }
  .event-select-wrap select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 14px;
    color: var(--text);
    appearance: none;
    outline: none;
  }
  .event-select-wrap::after {
    content: '▾';
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  /* ── QR CAMERA ── */
  #qr-reader-wrap {
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    background: #000;
    aspect-ratio: 1;
    position: relative;
    margin-bottom: 16px;
  }
  #qr-reader { width: 100% !important; border: none !important; }
  #qr-reader video { width: 100% !important; object-fit: cover; }
  #qr-reader img { display: none !important; }
  #qr-reader * { border: none !important; }

  /* scanner overlay corners */
  .scan-frame {
    position: absolute;
    inset: 0;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .scan-corners {
    width: 200px;
    height: 200px;
    position: relative;
  }
  .scan-corners::before,
  .scan-corners::after,
  .scan-corners > span::before,
  .scan-corners > span::after {
    content: '';
    position: absolute;
    width: 28px;
    height: 28px;
    border-color: rgba(255,255,255,.8);
    border-style: solid;
  }
  .scan-corners::before { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 3px 0 0 0; }
  .scan-corners::after  { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 3px 0 0; }
  .scan-corners > span::before { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 3px; }
  .scan-corners > span::after  { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 3px 0; }

  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.6), transparent);
    animation: scan 2s ease-in-out infinite;
    top: 50%;
  }
  @keyframes scan {
    0%, 100% { transform: translateY(-90px); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    50% { transform: translateY(90px); }
  }

  /* scanner status hint */
  .scan-hint {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  #start-scan-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 20px;
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: background .15s;
    margin-bottom: 16px;
  }
  #start-scan-btn:hover { background: #1a1a1a; }
  #camera-icon { display: block; margin-bottom: 4px; }

  /* ── RESULT CARD ── */
  #result-card {
    border-radius: var(--radius);
    padding: 20px;
    border: 1px solid var(--border);
    display: none;
    animation: slideUp .2s ease;
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } }

  #result-card.valid   { background: var(--green-dim); border-color: rgba(34,197,94,.25); }
  #result-card.used    { background: var(--red-dim);   border-color: rgba(239,68,68,.2); }
  #result-card.invalid { background: var(--red-dim);   border-color: rgba(239,68,68,.2); }

  .result-status {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .status-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .valid   .status-icon { background: rgba(34,197,94,.2); }
  .used    .status-icon { background: rgba(239,68,68,.2); }
  .invalid .status-icon { background: rgba(239,68,68,.2); }

  .status-label {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -.01em;
  }
  .valid   .status-label { color: var(--green); }
  .used    .status-label { color: var(--red);   }
  .invalid .status-label { color: var(--red);   }

  .result-info {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }
  .info-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .info-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--muted);
    width: 60px;
    flex-shrink: 0;
  }
  .info-value {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }
  .info-value.name { font-size: 18px; font-weight: 700; letter-spacing: -.02em; }

  .result-actions {
    display: flex;
    gap: 10px;
  }

  /* confirm success state */
  #confirm-success {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px;
    background: var(--green-dim);
    border: 1px solid rgba(34,197,94,.25);
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 600;
    color: var(--green);
    animation: slideUp .2s ease;
    margin-top: 12px;
  }

  /* spinner for confirm action */
  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* scan again hint after confirm */
  #scan-again-hint {
    display: none;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 12px;
  }

  /* ── DATA TAB ── */
  .data-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 10px;
  }
  .data-header h2 {
    font-size: 15px;
    font-weight: 700;
  }

  .stats-strip {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 10px;
    text-align: center;
  }
  .stat-box .num {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -.03em;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-box .label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .07em;
  }
  .stat-box.checked .num { color: var(--green); }
  .stat-box.pending .num { color: var(--amber); }

  /* search + export bar */
  .data-toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .data-toolbar input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 13px;
    color: var(--text);
    outline: none;
  }
  .data-toolbar input::placeholder { color: var(--muted); }

  /* registrations list */
  #regs-list { display: flex; flex-direction: column; gap: 8px; }

  .reg-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color .15s;
  }
  .reg-card:hover { border-color: #333; }
  .reg-card.checked-in { border-color: rgba(34,197,94,.25); background: rgba(34,197,94,.04); }

  .reg-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--muted);
  }
  .reg-card.checked-in .reg-dot { background: var(--green); }

  .reg-info { flex: 1; min-width: 0; }
  .reg-name {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .reg-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .reg-time {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .reg-card.checked-in .reg-time { color: var(--green); }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
    font-size: 14px;
  }
  .empty-state .icon { font-size: 32px; margin-bottom: 10px; }

  /* ── MODAL (registration detail) ── */
  #modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 100;
    padding: 0 0 env(safe-area-inset-bottom);
  }
  #modal-overlay.visible { display: flex; }
  #modal-sheet {
    background: #111;
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 16px 16px 0 0;
    padding: 20px;
    width: 100%;
    max-width: 480px;
    animation: sheetUp .22s ease;
  }
  @keyframes sheetUp { from { transform: translateY(60px); opacity: 0; } }
  .modal-handle {
    width: 36px;
    height: 4px;
    background: #333;
    border-radius: 2px;
    margin: 0 auto 18px;
  }
  .modal-name {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -.02em;
    margin-bottom: 4px;
  }
  .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; }

  .modal-fields {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 18px;
  }
  .mfield { display: flex; gap: 12px; align-items: baseline; }
  .mfield-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; width: 72px; flex-shrink: 0; }
  .mfield-value { font-size: 14px; font-weight: 500; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .badge.green { background: var(--green-dim); color: var(--green); }
  .badge.grey  { background: rgba(255,255,255,.06); color: var(--muted); }
  .badge.red   { background: var(--red-dim); color: var(--red); }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: calc(16px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    z-index: 200;
    transition: transform .25s ease, opacity .25s;
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── LOADING ── */
  .loading-state {
    text-align: center;
    padding: 32px;
    color: var(--muted);
    font-size: 13px;
  }

  /* Beep feedback animation on scan */
  @keyframes flashGreen {
    0%   { background: var(--bg); }
    10%  { background: rgba(34,197,94,.08); }
    100% { background: var(--bg); }
  }
  @keyframes flashRed {
    0%   { background: var(--bg); }
    10%  { background: rgba(239,68,68,.08); }
    100% { background: var(--bg); }
  }
  body.flash-green { animation: flashGreen .5s ease forwards; }
  body.flash-red   { animation: flashRed .5s ease forwards; }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-logo">
    <img src="/images/kfs-logo.png" alt="KFS" style="width:56px;height:56px;border-radius:14px;object-fit:cover;">
    <h1>Event Scanner</h1>
  </div>

  <div class="login-card">
    <h2>Sign in</h2>
    <p>Use your KFS admin credentials</p>

    <div id="login-error"></div>

    <div class="field">
      <label>Username</label>
      <input type="text" id="l-user" autocomplete="username" autocapitalize="none" placeholder="username">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="l-pass" autocomplete="current-password" placeholder="••••••••">
    </div>
    <div class="field" id="totp-field" style="display:none">
      <label>2FA Code</label>
      <input type="text" id="l-totp" inputmode="numeric" pattern="[0-9]*" placeholder="000000" maxlength="6">
    </div>

    <button class="btn btn-primary" id="login-btn" onclick="doLogin()">Sign in</button>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div id="app">
  <!-- Top bar -->
  <div class="topbar">
    <img src="/images/kfs-logo.png" alt="KFS" class="kfs-badge" style="width:32px;height:32px;border-radius:8px;object-fit:cover;">
    <div class="event-name" id="topbar-event">Select event</div>
    <div class="admin-name" id="topbar-admin"></div>
    <button class="logout-btn" onclick="doLogout()" title="Sign out">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-btn-scanner" onclick="switchTab('scanner')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Scan</button>
    <button class="tab" id="tab-btn-data"    onclick="switchTab('data')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg> Registrations</button>
  </div>

  <!-- Scanner tab -->
  <div id="tab-scanner" class="visible">
    <!-- Event select -->
    <div class="event-select-wrap">
      <select id="event-select" onchange="onEventChange()">
        <option value="">— Select event to scan for —</option>
      </select>
    </div>

    <!-- Camera / start button -->
    <button id="start-scan-btn" onclick="startCamera()">
      <div>
        <span id="camera-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin-bottom:4px;opacity:.7"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></span>
        <div>Tap to start camera</div>
      </div>
    </button>

    <!-- QR reader (hidden until started) -->
    <div id="qr-reader-wrap" style="display:none">
      <div id="qr-reader"></div>
      <div class="scan-frame">
        <div class="scan-corners">
          <span></span>
          <div class="scan-line"></div>
        </div>
      </div>
    </div>

    <div class="scan-hint" id="scan-hint" style="display:none">Align QR code inside the frame</div>

    <!-- Result card -->
    <div id="result-card">
      <div class="result-status">
        <div class="status-icon" id="res-icon"></div>
        <div>
          <div class="status-label" id="res-label"></div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px" id="res-sublabel"></div>
        </div>
      </div>
      <div class="result-info" id="res-info"></div>
      <div class="result-actions" id="res-actions"></div>
    </div>

    <div id="confirm-success">✓ Entry confirmed — <span id="confirm-name"></span></div>
    <div id="scan-again-hint">Camera paused — scan next ticket</div>
  </div>

  <!-- Data tab -->
  <div id="tab-data">
    <!-- event select for data -->
    <div class="event-select-wrap">
      <select id="data-event-select" onchange="loadRegistrations()">
        <option value="">— Select event —</option>
      </select>
    </div>

    <div id="data-content">
      <div class="empty-state"><div class="icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:.4"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></div>Select an event to view registrations</div>
    </div>
  </div>
</div>

<!-- ── DETAIL MODAL ── -->
<div id="modal-overlay" onclick="closeModal()">
  <div id="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="/scanner.js"></script>
</body>
</html>
