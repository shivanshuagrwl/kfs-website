services:
  - type: web
    name: kfs-website
    env: node
    plan: free
    buildCommand: apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev && npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /opt/render/project/src/db/kfs.db
    disk:
      name: kfs-data
      mountPath: /opt/render/project/src
      sizeGB: 1
